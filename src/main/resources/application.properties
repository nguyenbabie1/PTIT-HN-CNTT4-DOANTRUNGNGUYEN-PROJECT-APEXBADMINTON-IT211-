spring.application.name=ApexBadminton

spring.datasource.url=jdbc:mysql://localhost:3306/apexbadminton_DB?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=30063008

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=apexbadminton-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.access-token-expiration-ms=1800000
jwt.refresh-token-expiration-ms=604800000

logging.file.name=logs/apexbadminton-audit.log
logging.level.com.example.badminton.aspect=INFO

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

password-reset.expiration-ms=3600000
